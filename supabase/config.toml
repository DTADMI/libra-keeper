project_id = "librakeeper-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323
open_in_browser = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/*", "http://127.0.0.1:3000/*"]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.smtp]
enabled = true
host = "supabase_inbucket_librakeeper-local"
port = 1025
user = "mailpit"
pass = "mailpit"
admin_email = "noreply@librakeeper.app"
sender_name = "LibraKeeper"

[auth.sessions]
timebox = "2h"
inactivity_timeout = "14d"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.media]
public = true
file_size_limit = "50MiB"
allowed_mime_types = ["image/*", "audio/*", "application/pdf"]

[storage.buckets.private-media]
public = false
file_size_limit = "50MiB"
allowed_mime_types = ["image/*", "audio/*", "application/pdf", "text/*"]

[realtime]
enabled = true
max_concurrent_users = 200

[analytics]
enabled = false

[functions]
enabled = false

[hook]
enabled = false

[inbucket]
enabled = true
smtp_port = 54325
pop3_port = 54326
